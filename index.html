<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📝 Daily Todo R & M</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <nav class="main-nav">
            <a href="index.html" class="nav-main-btn active">📝 Task</a>
            <a href="history.html" class="nav-main-btn">📚 History</a>
            <a href="ranking.html" class="nav-main-btn">🏆 Ranking</a>
        </nav>

        <header>
            <h1>Daily Todo <span>R & M</span></h1>
            <div class="date-picker-area">
                <input type="date" id="calendar-input">
            </div>
        </header>

        <div class="ranking-box">
            <div class="ranking-header">
                <span>🧑🏻 RANGGA: <span id="score-rangga">0</span></span>
                <span>🏆 LIVE RANKING <span id="current-month">MEI</span></span>
                <span>👩🏻 MALIKA: <span id="score-malika">0</span></span>
            </div>
            <div class="rank-bars">
                <div id="bar-rangga" class="bar bar-rangga" style="width: 50%"></div>
                <div id="bar-malika" class="bar bar-malika" style="width: 50%"></div>
            </div>
        </div>

        <div class="user-tabs">
            <button id="tab-rangga" class="tab-btn active" onclick="window.switchUser('rangga')">🧑🏻 Rangga</button>
            <button id="tab-malika" class="tab-btn" onclick="window.switchUser('malika')">👩🏻 Malika</button>
        </div>

        <div class="input-group">
            <input type="text" id="task-input" placeholder="Tulis rencana kamu...">
            <button onclick="window.showAddModal()" class="btn-add">+</button>
        </div>

        <ul id="task-list"></ul>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modal-title">Konfirmasi</h3>
            <p id="modal-desc" style="margin: 10px 0; color: #64748b;"></p>
            <div id="modal-input-container" style="display:none; margin: 15px 0;">
                <input type="text" id="modal-input-field" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" onclick="window.closeModal()">Batal</button>
                <button id="modal-ok-btn" class="modal-btn btn-confirm">Ya, Lakukan</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
