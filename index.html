<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎯 Target Hari Ini | Daily To-Do</title>
    <style>
        /* --- CSS Reset & Variables --- */
        :root {
            --primary: #7c3aed; /* Violet 600 */
            --primary-light: #ddd6fe;
            --primary-dark: #6d28d9;
            --success: #10b981; /* Emerald 500 */
            --warning: #f59e0b; /* Amber 500 */
            --danger: #ef4444; /* Red 500 */
            
            --bg-page: #f9fafb;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;

            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
        }

        /* --- Main Container --- */
        .app-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 500px;
            margin-top: 24px;
            margin-bottom: 24px;
            padding: 32px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent list from bursting out */
        }

        @media (max-width: 600px) {
            .app-container {
                margin-top: 0;
                margin-bottom: 0;
                border-radius: 0;
                box-shadow: none;
                padding: 24px;
            }
        }

        /* --- Header Section --- */
        header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        h1 span {
            color: var(--primary);
        }

        .date-display {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }

        /* --- Stats Card --- */
        .stats-card {
            background-color: #faf5ff; /* Violet 50 */
            border: 1px solid var(--primary-light);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-info h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stats-info p {
            font-size: 0.9rem;
            color: var(--primary-dark);
        }

        .progress-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(closest-side, white 79%, transparent 80% 100%),
                        conic-gradient(var(--success) 0%, #e2e8f0 0%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: var(--success);
            font-size: 1.1rem;
            transition: background 0.3s ease;
        }

        /* --- Input Section --- */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
                gap: 8px;
            }
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 14px 18px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        button.btn-add {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px var(--primary-light);
        }

        button.btn-add:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        button.btn-add:active {
            transform: translateY(1px);
        }

        /* --- Task List Section --- */
        ul {
            list-style-type: none;
            flex-grow: 1;
            overflow-y: auto; /* Allow the list to scroll if too long */
            padding-right: 4px; /* Space for scrollbar */
        }

        /* Custom scrollbar style */
        ul::-webkit-scrollbar {
            width: 6px;
        }
        ul::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        li {
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        li.completed {
            background-color: #ecfdf5; /* Emerald 50 */
            border-color: #a7f3d0; /* Emerald 200 */
        }

        li.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.7;
        }

        li:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        /* Custom Checkbox */
        .checkbox-container {
            position: relative;
            display: block;
            width: 24px;
            height: 24px;
            margin-right: 16px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0; width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0; left: 0;
            height: 24px; width: 24px;
            background-color: #f1f5f9; /* Slate 100 */
            border: 2px solid #cbd5e1; /* Slate 300 */
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .checkbox-container:hover input ~ .checkmark {
            background-color: #e2e8f0;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 7px; top: 3px;
            width: 6px; height: 11px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .task-text {
            flex-grow: 1;
            font-size: 1.05rem;
            font-weight: 500;
            word-break: break-word;
            padding-right: 12px;
            line-height: 1.4;
            transition: color 0.3s ease;
        }

        .actions {
            display: flex;
            gap: 8px;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        li:hover .actions {
            opacity: 1;
        }

        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .btn-edit { color: var(--warning); }
        .btn-edit:hover { background-color: #fffbeb; } /* Amber 50 */

        .btn-delete { color: var(--danger); }
        .btn-delete:hover { background-color: #fef2f2; } /* Red 50 */

        /* --- Empty State --- */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-style: italic;
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>Daily <span>ToDO</span></h1>
            </div>
            <div class="date-display" id="current-date">Kamis, 15 Juni 2023</div>
        </header>

        <section class="stats-card">
            <div class="stats-info">
                <h2>Ringkasan Progres</h2>
                <p id="stats-counter">Lakukan task pertama hari ini!</p>
            </div>
            <div class="progress-circle" id="progress-circle">0%</div>
        </section>

        <div class="input-group">
            <input type="text" id="task-input" placeholder="Apa fokus utamamu hari ini?" autocomplete="off">
            <button id="add-btn" class="btn-add">+ Tambah</button>
        </div>

        <ul id="task-list"></ul>
        <div id="empty-state" class="empty-state">🎯 Mulai hari ini dengan menambahkan target!</div>
    </div>

    <script>
        // --- DOM Elements ---
        const taskInput = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const currentDateDisplay = document.getElementById('current-date');
        const emptyState = document.getElementById('empty-state');
        const statsCounter = document.getElementById('stats-counter');
        const progressCircle = document.getElementById('progress-circle');

        // --- State Management ---
        let tasks = [];
        
        // --- Date Setup ---
        const today = new Date();
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        // Use ID for full display, and a simplified version for the tracking key
        const fullDateString = today.toLocaleDateString('id-ID', dateOptions);
        const dateTrackingKey = `todo_date_${today.toLocaleDateString('id-ID')}`; 

        currentDateDisplay.textContent = fullDateString;

        // --- Initialize App ---
        function init() {
            // Daily Reset Logic
            // We check for *any* previous data to decide if we need to reset
            const lastActiveDateKey = localStorage.getItem('todo_last_active_key');
            
            if (lastActiveDateKey && lastActiveDateKey !== dateTrackingKey) {
                // It's a new day! Clear the old day's data
                tasks = [];
                // Update the last active key to today
                localStorage.setItem('todo_last_active_key', dateTrackingKey);
                saveData();
            } else {
                // Same day, or first-time use. Load existing tasks for today.
                const savedTasks = localStorage.getItem('todo_tasks');
                if (savedTasks) {
                    tasks = JSON.parse(savedTasks);
                }
                // Also set the key for the first time
                localStorage.setItem('todo_last_active_key', dateTrackingKey);
            }
            renderTasks();
        }

        // --- Save to LocalStorage ---
        function saveData() {
            localStorage.setItem('todo_tasks', JSON.stringify(tasks));
        }

        // --- Core Functions ---

        // 1. Add Task
        function addTask() {
            const text = taskInput.value.trim();
            if (text !== '') {
                const newTask = {
                    id: `task_${Date.now()}`,
                    text: text,
                    completed: false
                };
                // Prepend new tasks to show them at the top
                tasks.unshift(newTask);
                saveData();
                taskInput.value = '';
                taskInput.focus();
                renderTasks();
            } else {
                // Focus input if empty and added
                taskInput.focus();
            }
        }

        // 2. Delete Task
        window.deleteTask = function(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveData();
            renderTasks();
        }

        // 3. Edit Task
        window.editTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                const newText = prompt("Edit task:", task.text);
                if (newText !== null && newText.trim() !== '') {
                    task.text = newText.trim();
                    saveData();
                    renderTasks();
                }
            }
        }

        // 4. Toggle Status (Complete/Incomplete)
        window.toggleStatus = function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveData();
                renderTasks(); // Re-render to update the visual state
            }
        }

        // --- Update Progress Stats ---
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;

            if (total === 0) {
                statsCounter.textContent = "Tambahkan target untuk mulai!";
                progressCircle.textContent = "0%";
                progressCircle.style.background = `conic-gradient(#e2e8f0 0%, #e2e8f0 100%)`;
                return;
            }

            const percentage = Math.round((completed / total) * 100);
            
            if (total === completed) {
                statsCounter.textContent = "Selamat! Semua target hari ini tuntas. 🎉";
            } else {
                statsCounter.textContent = `${completed} dari ${total} task sudah selesai`;
            }

            progressCircle.textContent = `${percentage}%`;
            // Dynamic conic gradient to fill the circle visually
            const fillingPercentage = (percentage === 0) ? 0.01 : percentage;
            progressCircle.style.background = `
                radial-gradient(closest-side, white 79%, transparent 80% 100%),
                conic-gradient(var(--success) ${percentage}%, #e2e8f0 0%)`;
        }

        // --- Render Tasks to DOM ---
        function renderTasks() {
            taskList.innerHTML = '';
            updateStats();
            
            if (tasks.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    if (task.completed) li.classList.add('completed');
                    
                    li.innerHTML = `
                        <label class="checkbox-container">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleStatus('${task.id}')">
                            <span class="checkmark"></span>
                        </label>
                        <span class="task-text">${task.text}</span>
                        <div class="actions">
                            <button class="btn-action btn-edit" onclick="editTask('${task.id}')" title="Edit">✎</button>
                            <button class="btn-action btn-delete" onclick="deleteTask('${task.id}')" title="Hapus">✖</button>
                        </div>
                    `;
                    taskList.appendChild(li);
                });
            }
        }

        // --- Event Listeners ---
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // --- Run on Load ---
        init();
    </script>
</body>
</html>
