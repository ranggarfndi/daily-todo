<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏆 Ranking | Daily Todo R & M</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <nav class="main-nav">
            <a href="index.html" class="nav-main-btn">📝 Task</a>
            <a href="history.html" class="nav-main-btn">📚 History</a>
            <a href="ranking.html" class="nav-main-btn active">🏆 Ranking</a>
        </nav>

        <header>
            <h1>🏆 Live <span>Ranking</span></h1>
            <div class="date-picker-area">
                <div class="filter-item">
                    <input type="month" id="rank-month-input" onchange="window.loadRankingPageData()">
                </div>
                <div class="filter-item">
                    <button class="btn-reset" onclick="window.resetRankFilter()">🔄 Reset</button>
                </div>
            </div>
        </header>

        <div class="ranking-box main-rank-card">
            <div class="ranking-header">
                <span id="rank-title-label">MEMUAT...</span>
            </div>
            
            <div class="podium-area">
                <div class="podium-col" id="podium-rangga">
                    <div class="winner-badge" id="badge-rangga">👑 WINNER</div>
                    <span class="emoji">🧑🏻</span>
                    <span class="name">Rangga</span>
                    <div class="score-pill"><span id="live-score-rangga">0</span> Task</div>
                </div>
                
                <div class="vs-divider">VS</div>

                <div class="podium-col" id="podium-malika">
                    <div class="winner-badge" id="badge-malika">👑 WINNER</div>
                    <span class="emoji">👩🏻</span>
                    <span class="name">Malika</span>
                    <div class="score-pill"><span id="live-score-malika">0</span> Task</div>
                </div>
            </div>

            <div class="rank-bars" style="margin-top: 20px;">
                <div id="bar-rangga" class="bar bar-rangga" style="width: 50%"></div>
                <div id="bar-malika" class="bar bar-malika" style="width: 50%"></div>
            </div>
        </div>

        <section class="rank-history-section">
            <h3 class="section-title">📜 Juara Bulan Lalu</h3>
            <div id="last-month-winner-card" class="winner-history-card">
                <div class="empty-state">Mencari data pemenang...</div>
            </div>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
